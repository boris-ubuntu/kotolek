databases:
  - name: kotolek-db
    databaseName: kotolek
    user: kotolek
    plan: free

services:
  - type: web
    name: kotolek
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kotolek-db
          property: connectionString
