<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Котолёк - Семейный бюджет</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#282832">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Котолёк">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="css/style.css?v=8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <form id="login-form" class="login-card">
            <h2>🐱 Котолёк</h2>
            <p class="login-sub">Вход в семейный бюджет</p>
            <input type="text" id="login-username" placeholder="Логин" autocomplete="username" required>
            <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password" required>
            <button type="submit">Войти</button>
            <div id="login-error" class="login-error"></div>
        </form>
    </div>
    <div id="app" class="hidden">
        <header>
            <h1>🐱 <span>Котолёк</span></h1>
            <div class="header-right">
                <span id="current-date"></span>
                <button id="logout-btn" class="logout-btn" aria-label="Выйти">Выйти</button>
            </div>
        </header>
        <main>
            <section id="balance-section">
                <div class="balance-card">
                    <h2>Семейный счёт</h2>
                    <div id="balance-amount">0 ₽</div>
                    <div id="month-income" class="month-income"></div>
                </div>
                <div class="balance-card top-expense-card" id="top-expense-card">
                    <h2>Топ расход за месяц</h2>
                    <div id="top-expense-amount">0 ₽</div>
                    <div id="expense-trend" class="expense-trend"></div>
                </div>
            </section>
            
            <section id="chart-section">
                <div class="chart-container">
                    <canvas id="expense-chart"></canvas>
                </div>
                <div id="month-total">Загрузка...</div>
            </section>
            <section id="histogram-section">
                <h3>Динамика расходов</h3>
                <div class="histogram-container">
                    <canvas id="monthly-histogram"></canvas>
                </div>
            </section>
            <section id="graph-section">
                <h3>Баланс</h3>
                <div class="graph-container">
                    <canvas id="balance-graph"></canvas>
                </div>
            </section>
            <section id="recent-section">
                <h3>Последние операции</h3>
                <div id="recent-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
            
            <section id="actions-section" style="display:flex;gap:10px;margin-top:16px;margin-bottom:20px;flex-wrap:wrap;">
                <button id="export-btn" class="action-btn export-btn">Экспорт CSV</button>
                <label for="import-file" class="action-btn import-btn">Импорт CSV</label>
                <input type="file" id="import-file" accept=".csv" style="display:none;">
            </section>
        </main>
        <button id="add-btn" class="fab" aria-label="Добавить операцию">+</button>
    </div>
    
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2>➕ Добавить</h2>
            <form id="transaction-form" autocomplete="off">
                <div class="form-group">
                    <label for="amount">Сумма (₽)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="transaction-type">Тип</label>
                    <select id="transaction-type">
                        <option value="expense">Расход</option>
                        <option value="income">Доход</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" required></select>
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <input type="text" id="description" placeholder="На что потратили?" maxlength="100">
                </div>
                <button type="submit">✅ Добавить</button>
                <button type="button" id="close-modal">❌ Отмена</button>
            </form>
        </div>
    </div>
    
    <div id="delete-modal-overlay" class="hidden">
        <div id="delete-modal">
            <h2>🗑️ Удалить операцию?</h2>
            <p>Вы уверены, что хотите удалить эту операцию?</p>
            <div class="buttons">
                <button class="btn-confirm" id="delete-confirm">Да, удалить</button>
                <button class="btn-cancel" id="delete-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <div id="info-modal-overlay" class="hidden">
        <div id="info-modal">
            <h2 id="info-modal-title"></h2>
            <div id="info-modal-body"></div>
            <button class="btn-cancel" id="info-modal-close">Закрыть</button>
        </div>
    </div>
    
    <script src="js/utils.js?v=7"></script>
    <script src="js/api.js?v=7"></script>
    <script src="js/components/balance.js?v=7"></script>
    <script src="js/components/chart.js?v=7"></script>
    <script src="js/components/histogram.js?v=7"></script>
    <script src="js/components/graph.js?v=7"></script>
    <script src="js/components/recent.js?v=7"></script>
    <script src="js/components/modal.js?v=7"></script>
    <script src="js/components/delete-modal.js?v=7"></script>
    <script src="js/app.js?v=7"></script>
</body>
</html>
