<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Котолёк - Семейный бюджет</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>🐱 <span>Котолёк</span></h1>
            <span id="current-date"></span>
        </header>
        <main>
            <section id="balance-section">
                <div class="balance-card">
                    <h2>💰 Семейный счёт</h2>
                    <div id="balance-amount">0 ₽</div>
                </div>
            </section>
            
            <section id="chart-section">
                <div class="chart-container">
                    <canvas id="expense-chart"></canvas>
                </div>
                <div id="month-total">Загрузка...</div>
            </section>
            <section id="histogram-section">
                <h3>📊 Динамика расходов</h3>
                <div class="histogram-container">
                    <canvas id="monthly-histogram"></canvas>
                </div>
            </section>
            <section id="graph-section">
                <canvas id="balance-graph"></canvas>
            </section>
            <section id="recent-section">
                <h3>📋 Последние операции</h3>
                <div id="recent-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
            
            <section id="actions-section" style="display:flex;gap:10px;margin-top:16px;margin-bottom:20px;flex-wrap:wrap;">
                <button id="export-btn" style="flex:1;padding:14px;background:#667eea;color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:15px;min-width:120px;">📥 Экспорт CSV</button>
                <label for="import-file" style="flex:1;padding:14px;background:#48bb78;color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:15px;text-align:center;min-width:120px;">📤 Импорт CSV</label>
                <input type="file" id="import-file" accept=".csv" style="display:none;">
            </section>
        </main>
        <button id="add-btn" class="fab" aria-label="Добавить операцию">+</button>
    </div>
    
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2>➕ Добавить операцию</h2>
            <form id="transaction-form" autocomplete="off">
                <div class="form-group">
                    <label for="amount">Сумма (₽)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="transaction-type">Тип</label>
                    <select id="transaction-type">
                        <option value="expense">Расход</option>
                        <option value="income">Доход</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Категория</label>
                    <select id="category" required></select>
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <input type="text" id="description" placeholder="На что потратили?" maxlength="100">
                </div>
                <button type="submit">✅ Добавить</button>
                <button type="button" id="close-modal">❌ Отмена</button>
            </form>
        </div>
    </div>
    
    <div id="delete-modal-overlay" class="hidden">
        <div id="delete-modal">
            <h2>🗑️ Удалить операцию?</h2>
            <p>Вы уверены, что хотите удалить эту операцию?</p>
            <div class="buttons">
                <button class="btn-confirm" id="delete-confirm">Да, удалить</button>
                <button class="btn-cancel" id="delete-cancel">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/balance.js"></script>
    <script src="js/components/chart.js"></script>
    <script src="js/components/histogram.js"></script>
    <script src="js/components/graph.js"></script>
    <script src="js/components/recent.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/delete-modal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
