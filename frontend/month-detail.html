<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Котолёк - Детали месяца</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/api.js"></script>
    <style>
        #chart-section {
            background: #32323e;
            border-radius: 16px;
            padding: 20px 16px 12px 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #chart-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.55);
            margin-bottom: 12px;
        }
        .detail-chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }
        .detail-chart-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            height: 0;
            overflow: hidden;
        }
        .detail-chart-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
        @media (max-width: 480px) {
            .detail-chart-wrapper {
                max-width: 320px;
            }
        }
        /* Кнопка «Назад» сверху слева */
        .back-btn {
            background: #3a3a47;
            border: none;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
            transition: background 0.15s ease;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .back-btn:hover {
            background: #454552;
        }
        .back-btn:active {
            opacity: 0.9;
        }
        /* Заголовок месяца по центру, без иконки */
        header {
            position: relative;
        }
        .month-title-center {
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            pointer-events: none;
            z-index: 0;
        }
        .back-btn {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button id="back-btn" class="back-btn" aria-label="Назад">← Назад</button>
            <h1 class="month-title-center"><span id="month-title">Январь 2026</span></h1>
            <span></span>
        </header>
        <main>
            <section id="summary-section" style="background:#32323e;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">
                <div style="display:flex;justify-content:space-around;text-align:center;">
                    <div>
                        <div style="font-size:12px;color:#a0aec0;">Доходы</div>
                        <div id="summary-income" style="font-size:20px;font-weight:700;color:#5cd59b;">0 ₽</div>
                    </div>
                    <div>
                        <div style="font-size:12px;color:#a0aec0;">Расходы</div>
                        <div id="summary-expense" style="font-size:20px;font-weight:700;color:#f27362;">0 ₽</div>
                    </div>
                    <div>
                        <div style="font-size:12px;color:#a0aec0;">Баланс</div>
                        <div id="summary-balance" style="font-size:20px;font-weight:700;color:#e2e8f0;">0 ₽</div>
                    </div>
                </div>
            </section>
            
            <section id="chart-section">
                <h3>Расходы по категориям</h3>
                <div class="detail-chart-wrapper">
                    <div class="detail-chart-container">
                        <canvas id="month-detail-chart"></canvas>
                    </div>
                </div>
            </section>
            
            <section id="transactions-section" style="background:#32323e;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,0.55);">Все операции</h3>
                <div id="transactions-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
        </main>
    </div>
    
    <div id="delete-modal-overlay" class="hidden">
        <div id="delete-modal">
            <h2>🗑️ Удалить операцию?</h2>
            <p>Вы уверены, что хотите удалить эту операцию?</p>
            <div class="buttons">
                <button class="btn-confirm" id="delete-confirm">Да, удалить</button>
                <button class="btn-cancel" id="delete-cancel">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        let currentYear, currentMonth;
        let deleteModal = null;
        let detailChart = null;
        let allTransactions = [];
        
        function formatCurrency(amount) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency',
                currency: 'RUB',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(amount);
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
        
        function getCategoryGroup(categoryName) {
            const groups = {
                'Продукты': 'Еда',
                'Кафе': 'Еда',
                'Топливо': 'Авто',
                'Мойка': 'Авто',
                'Тех. обслуживание': 'Авто',
                'Товары': 'Товары',
                'Дети': 'Товары',
                'Одежда': 'Товары',
                'Спорт': 'Мероприятия',
                'Культура': 'Мероприятия',
                'События': 'Мероприятия',
                'Интернет': 'Платежи',
                'Штрафы': 'Платежи',
                'ЖКХ': 'Платежи',
                'Общественный транспорт': 'Платежи',
                'Прочее': 'Платежи',
                'Доход': 'Доход'
            };
            return groups[categoryName] || categoryName;
        }
        
        function getCategoryColorByGroup(groupName) {
            const colors = {
                'Еда': '#5390d9',
                'Авто': '#56cfe1',
                'Товары': '#5e60ce',
                'Мероприятия': '#6930c3',
                'Платежи': '#2acbcb',
                'Доход': '#4ea8de'
            };
            return colors[groupName] || '#999999';
        }
        
        async function loadMonthDetails(year, month) {
            currentYear = year;
            currentMonth = month;
            
            document.getElementById('month-title').textContent = monthNames[month - 1] + ' ' + year;
            
            try {
                const transactions = await API.request('/transactions/by-month?year=' + year + '&month=' + month);
                allTransactions = transactions;
                renderTransactions(transactions);
                updateSummary(transactions);
                renderDetailChart(transactions);
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactions-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }
        
        function updateSummary(transactions) {
            let income = 0, expense = 0;
            for (let i = 0; i < transactions.length; i++) {
                if (transactions[i].is_income) {
                    income += transactions[i].amount;
                } else {
                    expense += transactions[i].amount;
                }
            }
            const balance = income - expense;
            document.getElementById('summary-income').textContent = formatCurrency(income);
            document.getElementById('summary-expense').textContent = formatCurrency(expense);
            document.getElementById('summary-balance').textContent = formatCurrency(balance);
            document.getElementById('summary-balance').style.color = balance >= 0 ? '#5cd59b' : '#f27362';
        }
        
        function renderDetailChart(transactions) {
            const canvas = document.getElementById('month-detail-chart');
            if (!canvas) return;
            
            const groups = {};
            for (let i = 0; i < transactions.length; i++) {
                const txn = transactions[i];
                if (txn.is_income) continue;
                const groupName = getCategoryGroup(txn.category_name);
                const groupColor = getCategoryColorByGroup(groupName);
                if (!groups[groupName]) {
                    groups[groupName] = {
                        name: groupName,
                        color: groupColor,
                        total: 0
                    };
                }
                groups[groupName].total += txn.amount;
            }
            
            const labels = Object.keys(groups);
            const values = labels.map(function(key) { return groups[key].total; });
            const colors = labels.map(function(key) { return groups[key].color; });
            
            if (detailChart) {
                detailChart.destroy();
                detailChart = null;
            }
            
            if (labels.length === 0) {
                return;
            }
            
            const totalExpenses = values.reduce((a, b) => a + b, 0);
            
            detailChart = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#32323e',
                        hoverOffset: 8,
                    }]
                },
                options: {
                    responsive: true,
                    // true — чтобы пончи вписывался в квадратный контейнер
                    // и оставался круглым (без искажения)
                    maintainAspectRatio: true,
                    cutout: '62%',
                    layout: {
                        padding: 6
                    },
                    plugins: {
                        legend: {
                            display: false,
                        },
                        tooltip: {
                            bodyFont: { family: 'Segoe UI, Tahoma, sans-serif', size: 13 },
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = ((context.raw / total) * 100).toFixed(1);
                                    return ' ' + context.label + ': ' + formatCurrency(context.raw) + ' (' + pct + '%)';
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'innerLabels',
                    afterDraw(chart) {
                        const { ctx, data, chartArea } = chart;
                        const meta = chart.getDatasetMeta(0);
                        if (!meta.data || meta.data.length === 0) return;

                        const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
                        const centerX = chartArea.left + chartArea.width / 2;
                        const centerY = chartArea.top + chartArea.height / 2;
                        const outerRadius = meta.data[0].outerRadius;
                        const innerRadius = meta.data[0].innerRadius;

                        const isNarrow = chart.width < 500;
                        const nameFont = isNarrow ? 11 : 13;
                        const pctFont = isNarrow ? 10 : 12;

                        ctx.save();
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';

                        for (let i = 0; i < data.labels.length; i++) {
                            const arc = meta.data[i];
                            const angle = arc.endAngle - arc.startAngle;
                            if (angle < 0.18) continue;

                            const midAngle = arc.startAngle + angle / 2;
                            const r = (innerRadius + outerRadius) / 2;
                            const x = centerX + Math.cos(midAngle) * r;
                            const y = centerY + Math.sin(midAngle) * r;
                            const value = data.datasets[0].data[i];
                            const pct = ((value / total) * 100).toFixed(1);

                            ctx.fillStyle = '#ffffff';
                            ctx.shadowColor = 'rgba(0,0,0,0.65)';
                            ctx.shadowBlur = 3;

                            ctx.font = 'bold ' + nameFont + 'px Segoe UI, Tahoma, sans-serif';
                            ctx.fillText(data.labels[i], x, y - (isNarrow ? 7 : 8));

                            ctx.font = pctFont + 'px Segoe UI, Tahoma, sans-serif';
                            ctx.fillStyle = 'rgba(255,255,255,0.85)';
                            ctx.fillText(pct + '%', x, y + (isNarrow ? 6 : 7));
                        }

                        ctx.restore();
                    }
                }, {
                    id: 'centerText',
                    beforeDraw: function(chart) {
                        const width = chart.width;
                        const height = chart.height;
                        const ctx = chart.ctx;
                        ctx.restore();
                        const fontSize = (height / 150).toFixed(2);
                        ctx.font = 'bold ' + fontSize + 'em Segoe UI, Tahoma, sans-serif';
                        ctx.textBaseline = 'middle';
                        const text = formatCurrency(totalExpenses);
                        const textY = height / 2;
                        ctx.fillStyle = '#e2e8f0';
                        ctx.textAlign = 'center';
                        ctx.fillText(text, width / 2, textY);
                        ctx.save();
                    }
                }]
            });
        }
        
        function renderTransactions(transactions) {
            const container = document.getElementById('transactions-list');
            if (!transactions || transactions.length === 0) {
                container.innerHTML = '<div class="loading">Нет операций за этот месяц</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < transactions.length; i++) {
                const txn = transactions[i];
                const groupName = getCategoryGroup(txn.category_name);
                const groupColor = getCategoryColorByGroup(groupName);
                const isIncome = txn.is_income;
                const sign = isIncome ? '+' : '-';
                const amountClass = isIncome ? 'income' : 'expense';
                const description = txn.description || 'Без описания';
                
                html += '<div class="recent-item" data-id="' + txn.id + '" onclick="window.showDeleteModal(' + txn.id + ')">';
                html += '<div class="info">';
                html += '<div class="tag" style="background:' + groupColor + '"></div>';
                html += '<div class="details">';
                html += '<div class="category-name">' + groupName + '</div>';
                html += '<div class="description">' + description + '</div>';
                html += '</div>';
                html += '</div>';
                html += '<div class="right">';
                html += '<div class="amount ' + amountClass + '">' + sign + ' ' + formatCurrency(txn.amount) + '</div>';
                html += '<div class="date">' + formatDate(txn.date) + '</div>';
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }
        
        function showDeleteModal(id) {
            if (deleteModal) {
                deleteModal.open(id);
            }
        }
        
        class DeleteModal {
            constructor() {
                this.overlay = document.getElementById('delete-modal-overlay');
                this.transactionId = null;
                this.init();
            }
            init() {
                document.getElementById('delete-confirm').addEventListener('click', () => this.confirm());
                document.getElementById('delete-cancel').addEventListener('click', () => this.close());
                this.overlay.addEventListener('click', (e) => {
                    if (e.target === this.overlay) this.close();
                });
                window.deleteModal = this;
            }
            open(id) {
                this.transactionId = id;
                this.overlay.classList.remove('hidden');
            }
            close() {
                this.overlay.classList.add('hidden');
                this.transactionId = null;
            }
            async confirm() {
                if (!this.transactionId) return;
                try {
                    await API.request('/transactions/' + this.transactionId, { method: 'DELETE' });
                    alert('✅ Операция удалена');
                    this.close();
                    loadMonthDetails(currentYear, currentMonth);
                } catch (error) {
                    alert('❌ Ошибка: ' + error.message);
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            API.onUnauthorized = () => { window.location.href = '/index.html'; };
            deleteModal = new DeleteModal();
            
            document.getElementById('back-btn').addEventListener('click', function() {
                window.location.href = '/index.html';
            });
            
            const params = new URLSearchParams(window.location.search);
            const year = parseInt(params.get('year')) || new Date().getFullYear();
            const month = parseInt(params.get('month')) || new Date().getMonth() + 1;
            
            loadMonthDetails(year, month);
        });
    </script>
</body>
</html>
