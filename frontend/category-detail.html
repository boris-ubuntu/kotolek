<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Котолёк - Категория</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <style>
        /* Кнопка «Назад» сверху слева */
        .back-btn {
            background: #3a3a47;
            border: none;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
            transition: background 0.15s ease;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .back-btn:hover {
            background: #454552;
        }
        .back-btn:active {
            opacity: 0.9;
        }
        /* Заголовок по центру, без иконки */
        header {
            position: relative;
        }
        .cat-title-center {
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            pointer-events: none;
            z-index: 0;
            line-height: 1.3;
        }
        .back-btn {
            position: relative;
            z-index: 1;
        }
        #summary-section {
            background: #32323e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            text-align: center;
        }
        #summary-total {
            font-size: 28px;
            font-weight: 700;
            color: #f27362;
        }
        #summary-sub {
            font-size: 13px;
            color: #a0aec0;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button id="back-btn" class="back-btn" aria-label="Назад">← Назад</button>
            <h1 class="cat-title-center"><span id="cat-title">Категория</span></h1>
            <span></span>
        </header>
        <main>
            <section id="summary-section">
                <div id="summary-total">0 ₽</div>
                <div id="summary-sub">расходов за месяц</div>
            </section>

            <section id="transactions-section" style="background:#32323e;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,0.55);">Все операции</h3>
                <div id="transactions-list">
                    <div class="loading">Загрузка...</div>
                </div>
            </section>
        </main>
    </div>

    <div id="delete-modal-overlay" class="hidden">
        <div id="delete-modal">
            <h2>🗑️ Удалить операцию?</h2>
            <p>Вы уверены, что хотите удалить эту операцию?</p>
            <div class="buttons">
                <button class="btn-confirm" id="delete-confirm">Да, удалить</button>
                <button class="btn-cancel" id="delete-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        let currentYear, currentMonth, currentGroup;
        let deleteModal = null;

        function formatCurrency(amount) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency',
                currency: 'RUB',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(amount);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getCategoryGroup(categoryName) {
            const groups = {
                'Продукты': 'Еда',
                'Кафе': 'Еда',
                'Топливо': 'Авто',
                'Мойка': 'Авто',
                'Тех. обслуживание': 'Авто',
                'Товары': 'Товары',
                'Дети': 'Товары',
                'Одежда': 'Товары',
                'Спорт': 'Мероприятия',
                'Культура': 'Мероприятия',
                'События': 'Мероприятия',
                'Интернет': 'Платежи',
                'Штрафы': 'Платежи',
                'ЖКХ': 'Платежи',
                'Общественный транспорт': 'Платежи',
                'Прочее': 'Платежи',
                'Доход': 'Доход'
            };
            return groups[categoryName] || categoryName;
        }

        function getCategoryColorByGroup(groupName) {
            const colors = {
                'Еда': '#5390d9',
                'Авто': '#56cfe1',
                'Товары': '#5e60ce',
                'Мероприятия': '#6930c3',
                'Платежи': '#2acbcb',
                'Доход': '#4ea8de'
            };
            return colors[groupName] || '#999999';
        }

        async function loadCategoryDetails(year, month, group) {
            currentYear = year;
            currentMonth = month;
            currentGroup = group;

            document.getElementById('cat-title').textContent = group + ' · ' + monthNames[month - 1] + ' ' + year;

            try {
                const transactions = await API.request('/transactions/by-month?year=' + year + '&month=' + month);
                const filtered = transactions.filter(function(txn) {
                    return !txn.is_income && getCategoryGroup(txn.category_name) === group;
                });
                renderTransactions(filtered);
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactions-list').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        function renderTransactions(transactions) {
            const container = document.getElementById('transactions-list');
            if (!transactions || transactions.length === 0) {
                container.innerHTML = '<div class="loading">Нет расходов по этой категории</div>';
                document.getElementById('summary-total').textContent = formatCurrency(0);
                return;
            }

            let total = 0;
            let html = '';
            for (let i = 0; i < transactions.length; i++) {
                const txn = transactions[i];
                total += txn.amount;
                const groupName = getCategoryGroup(txn.category_name);
                const groupColor = getCategoryColorByGroup(groupName);
                const description = txn.description || 'Без описания';

                html += '<div class="recent-item" data-id="' + txn.id + '" onclick="window.showDeleteModal(' + txn.id + ')">';
                html += '<div class="info">';
                html += '<div class="tag" style="background:' + groupColor + '"></div>';
                html += '<div class="details">';
                html += '<div class="category-name">' + txn.category_name + '</div>';
                html += '<div class="description">' + description + '</div>';
                html += '</div>';
                html += '</div>';
                html += '<div class="right">';
                html += '<div class="amount expense">- ' + formatCurrency(txn.amount) + '</div>';
                html += '<div class="date">' + formatDate(txn.date) + '</div>';
                html += '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
            document.getElementById('summary-total').textContent = formatCurrency(total);
        }

        function showDeleteModal(id) {
            if (deleteModal) {
                deleteModal.open(id);
            }
        }

        class DeleteModal {
            constructor() {
                this.overlay = document.getElementById('delete-modal-overlay');
                this.transactionId = null;
                this.init();
            }
            init() {
                document.getElementById('delete-confirm').addEventListener('click', () => this.confirm());
                document.getElementById('delete-cancel').addEventListener('click', () => this.close());
                this.overlay.addEventListener('click', (e) => {
                    if (e.target === this.overlay) this.close();
                });
                window.deleteModal = this;
            }
            open(id) {
                this.transactionId = id;
                this.overlay.classList.remove('hidden');
            }
            close() {
                this.overlay.classList.add('hidden');
                this.transactionId = null;
            }
            async confirm() {
                if (!this.transactionId) return;
                try {
                    await API.request('/transactions/' + this.transactionId, { method: 'DELETE' });
                    alert('✅ Операция удалена');
                    this.close();
                    loadCategoryDetails(currentYear, currentMonth, currentGroup);
                } catch (error) {
                    alert('❌ Ошибка: ' + error.message);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            API.onUnauthorized = () => { window.location.href = '/index.html'; };
            deleteModal = new DeleteModal();

            document.getElementById('back-btn').addEventListener('click', function() {
                window.location.href = '/index.html';
            });

            const params = new URLSearchParams(window.location.search);
            const year = parseInt(params.get('year')) || new Date().getFullYear();
            const month = parseInt(params.get('month')) || new Date().getMonth() + 1;
            const group = params.get('group') || 'Еда';

            loadCategoryDetails(year, month, group);
        });
    </script>
</body>
</html>
